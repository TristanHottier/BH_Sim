<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Interactive real-time simulation of gravitational lensing around a Schwarzschild black hole rendered in WebGL2."
        />
        <meta name="theme-color" content="#000000" />
        <meta property="og:title" content="Black Hole — Gravitational Lensing" />
        <meta
            property="og:description"
            content="Interactive real-time simulation of gravitational lensing around a Schwarzschild black hole rendered in WebGL2."
        />
        <meta property="og:image" content="screenshot.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="675" />
        <meta property="og:url" content="https://tristanhottier.github.io/BH_Sim/" />
        <meta property="og:type" content="website" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Black Hole — Gravitational Lensing" />
        <meta
            name="twitter:description"
            content="Interactive real-time simulation of gravitational lensing around a Schwarzschild black hole rendered in WebGL2."
        />
        <meta name="twitter:image" content="screenshot.png" />
        <link rel="canonical" href="https://tristanhottier.github.io/BH_Sim/" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="mobile-web-app-capable" content="yes" />
        <link rel="manifest" href="manifest.json" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='20' fill='%23000' stroke='%23ff8800' stroke-width='4'/><circle cx='50' cy='50' r='35' fill='none' stroke='%23ffaa44' stroke-width='1' opacity='0.5'/></svg>"
        />
        <link rel="apple-touch-icon" href="icon-192.png" />
        <title>Black Hole — Gravitational Lensing</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <canvas
            id="glCanvas"
            role="img"
            aria-label="Real-time simulation of gravitational lensing around a Schwarzschild black hole"
            tabindex="0"
        ></canvas>
        <div id="hud">
            <div id="title">
                Schwarzschild Black Hole <span class="subtitle">Gravitational Lensing • d²u/dφ² + u = 3Mu²</span>
            </div>
            <div id="stats">
                <span id="fps" aria-live="polite" aria-atomic="true">FPS: 0</span>
                <span id="version" class="version-badge">v?.?.?</span>
                <span id="camInfo">θ: 0.0° φ: 0.0° d: 22.0</span>
            </div>
            <div id="controls">
                <p><strong>Click / Touch + drag</strong> — θ/φ rotation</p>
                <p><strong>Scroll / Pinch</strong> — Zoom</p>
                <p><strong>R</strong> — Reset</p>
                <p><strong>Space</strong> — Pause</p>
            </div>
            <div id="sliders">
                <label
                    >Disk tilt
                    <input
                        type="range"
                        id="sliderPsiDisk"
                        min="-180"
                        max="180"
                        step="1"
                        value="0"
                        aria-label="Disk tilt angle"
                        aria-describedby="valPsiDisk"
                    />
                    <span id="valPsiDisk" aria-hidden="true">0.0°</span></label
                >
                <label
                    ><input type="checkbox" id="checkRealistic" aria-label="Toggle realistic Kepler rotation mode" />
                    Realistic rotation (Kepler)</label
                >
                <label
                    >Resolution
                    <input
                        type="range"
                        id="inputResolution"
                        min="10"
                        max="100"
                        step="1"
                        value="75"
                        aria-label="Render resolution"
                        aria-describedby="valResolution"
                    />
                    <span id="valResolution" aria-hidden="true">75%</span>
                    <span class="warning">⚠ GPU heavy above 90%</span></label
                >
            </div>
        </div>
        <div id="loading">Compiling shaders…</div>
        <script src="main.js" defer></script>
    </body>
</html>
