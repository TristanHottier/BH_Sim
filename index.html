<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Black Hole — Gravitational Lensing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="glCanvas"></canvas>
    <div id="hud">
        <div id="title">Schwarzschild Black Hole <span class="subtitle">Gravitational Lensing • d²u/dφ² + u = 3Mu²</span></div>
        <div id="stats">
            <span id="fps">FPS: 0</span>
            <span id="version" class="version-badge">v1.0.0</span>
            <span id="camInfo">θ: 0.0° φ: 0.0° d: 22.0</span>
        </div>
        <div id="controls">
            <p><strong>Click / Touch + drag</strong> — θ/φ rotation</p>
            <p><strong>Scroll / Pinch</strong> — Zoom</p>
            <p><strong>R</strong> — Reset</p>
            <p><strong>Space</strong> — Pause</p>
        </div>
        <div id="sliders">
            <label>Disk tilt <input type="range" id="sliderPsiDisk" min="-180" max="180" step="1" value="0"> <span id="valPsiDisk">0.0°</span></label>
            <label><input type="checkbox" id="checkRealistic"> Realistic rotation (Kepler)</label>
            <label><input type="checkbox" id="checkShadow"> Shadow border</label>
            <label><input type="checkbox" id="checkFullRes"> Full resolution <span class="warning">⚠ GPU heavy</span></label>
            
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
