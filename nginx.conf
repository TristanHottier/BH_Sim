server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # ── Cache static assets ─────────────────────────────────────────────────
    location ~* \.(html)$ {
        expires 0;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(png|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── GLSL shaders — no cache (source files) ──────────────────────────────
    location ~* \.glsl$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "text/plain";
    }

    # ── Deny access to dotfiles ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Fallback to index.html (SPA-like) ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
